<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juegos Educativos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f2f2f2;
    text-align:center;
}

/* TITULO PRINCIPAL */

.titulo-principal{
    background:linear-gradient(to right,#006400,#228B22);
    color:white;
    font-size:60px;
    font-weight:bold;
    text-transform:uppercase;
    text-shadow:4px 4px 6px rgba(0,0,0,0.5);
    padding:30px;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.subtitulo{
    font-size:24px;
    color:#222;
    font-weight:bold;
    margin:20px;
}

/* CAJAS DE JUEGOS */

.caja-juego{
    width:90%;
    max-width:900px;
    margin:25px auto;
    padding:20px;
    border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* COLORES */

.caja-azul{
    background:#d1ecff;
    border:5px solid #4cc9f0;
}

.caja-amarilla{
    background:#ffe0b2;
    border:5px solid #ff9800;
}

.caja-verde{
    background:#d8f3dc;
    border:5px solid #90be6d;
}

/* TITULOS */

.caja-juego h2{
    margin-bottom:15px;
    font-size:35px;
    color:black;
    background:white;
    padding:12px 20px;
    border-radius:12px;
    display:inline-block;
    text-shadow:2px 2px 3px rgba(0,0,0,0.2);
}

/* IFRAME */

iframe{
    border:0;
    width:100%;
    height:600px;
    border-radius:10px;
}

/* PIE */

footer{
    background:#006400;
    color:white;
    padding:20px;
    margin-top:30px;
    font-weight:bold;
}

/* 🔙 BOTÓN FINAL */
.volver{
    display:inline-block;
    margin:40px auto 20px;
    background:#d32f2f;
    color:white;
    text-decoration:none;
    padding:15px 35px;
    border-radius:12px;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 5px 10px rgba(0,0,0,0.3);
    transition:0.3s;
}

.volver:hover{
    background:#9a0007;
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="titulo-principal">
🎮 JUEGOS EDUCATIVOS INTERACTIVOS
</div>

<p class="subtitulo">
Aprende y diviértete con actividades sobre cuentos y leyendas ancestrales.
</p>

<h2>🧠 ENCUENTRA LAS PAREJAS</h2>
<iframe src="https://learningapps.org/watch?v=pp76v12x326" allowfullscreen></iframe>
</div>

<!-- JUEGO 2 -->
<div class="caja-juego caja-amarilla">
<h2>🧩 ROMPECABEZAS</h2>
<iframe src="https://www.jigsawplanet.com/?rc=play&pid=16d2c808c33e&view=iframe" allowfullscreen></iframe>
</div>

<!-- JUEGO 3 -->
<div class="caja-juego caja-verde">
<h2>🔎 SOPA DE LETRAS</h2>
<iframe src="https://learningapps.org/watch?v=pqz2si83j26" allowfullscreen></iframe>
</div>

<!-- JUEGO 4 -->
<div class="caja-juego caja-azul">
<h2>🎯 AHORCADO</h2>
<iframe src="https://learningapps.org/watch?v=pdi2xansk26" allowfullscreen></iframe>
</div>

<!-- JUEGO 5 -->

</div>

<footer>

</footer>

</body>
</html>
